<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <p>
            hello world
        </p>
        <input id="first" type="checkbox" onclick="submitbtn()">
        <p> read the terms carefully</p>
        <input id="second" type="checkbox" onclick="submitbtn()">
        <p> agree all the cookies</p>
        <button id="sub" type="button" disabled> submit</button>
    </form>
    <script>
        function submitbtn() {
            let c1 = document.getElementById("first").checked;
            let c2 = document.getElementById("second").checked;

            if (c1 && c2) {
                document.getElementById("sub").disabled = false;

            }
            else {
                document.getElementById("sub").disabled = true;
            }
        };

    </script>
</body>

</html>
